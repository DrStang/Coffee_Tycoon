<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0a07">
  <meta name="description" content="Grow beans. Roast perfection. Brew magic. Build your coffee empire!">
  <title>Coffee Tycoon</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☕</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="game-canvas"></canvas>

  <div id="title-screen" class="title-screen">
    <div class="title-coffee">☕
      <span class="title-steam" style="left:40%">~</span>
      <span class="title-steam" style="left:55%;animation-delay:0.6s">~</span>
      <span class="title-steam" style="left:48%;animation-delay:1.2s">~</span>
    </div>
    <div class="title-name">COFFEE TYCOON</div>
    <p class="title-desc">Pick ripe cherries from your farm. Roast them to perfection. Brew exquisite cups. Build a coffee empire — one bean at a time.</p>
    <div class="title-pipeline">
      <span>🌱</span><span class="arrow">→</span>
      <span>🔴</span><span class="arrow">→</span>
      <span>🔥</span><span class="arrow">→</span>
      <span>☕</span><span class="arrow">→</span>
      <span>💰</span>
    </div>
    <button id="start-btn" class="title-start">START BREWING</button>
  </div>

  <div id="hud">
    <div class="hud-top">
      <div class="hud-logo">☕ COFFEE TYCOON</div>
      <div id="hud-money" class="hud-money">💰 $0</div>
    </div>
    <div class="hud-pipeline">
      <div class="pip-box">🫘 <span id="pip-raw" style="color:var(--red)">0</span></div>
      <span class="pip-arrow">→</span>
      <div class="pip-box">🟤 <span id="pip-roasted" style="color:var(--orange)">0</span></div>
      <span class="pip-arrow">→</span>
      <div class="pip-box">☕ <span id="pip-cups" style="color:var(--blue)">0</span></div>
      <span id="pip-prestige" class="prestige-star" style="display:none"></span>
    </div>
  </div>

  <div id="panel-farm" class="panel active"><div id="farm-content"></div></div>
  <div id="panel-process" class="panel"><div id="process-content"></div></div>
  <div id="panel-shop" class="panel"><div id="shop-content"></div></div>
  <div id="panel-menu" class="panel"><div id="menu-content"></div></div>
  <div id="panel-stats" class="panel"><div id="stats-content"></div></div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="farm"><span class="tab-icon">🌱</span><span class="tab-label">Farm</span><span id="badge-farm" class="tab-badge" style="display:none">0</span></button>
    <button class="tab-btn" data-tab="process"><span class="tab-icon">🔥</span><span class="tab-label">Process</span></button>
    <button class="tab-btn" data-tab="shop"><span class="tab-icon">☕</span><span class="tab-label">Shop</span><span id="badge-shop" class="tab-badge" style="display:none">0</span></button>
    <button class="tab-btn" data-tab="menu"><span class="tab-icon">📋</span><span class="tab-label">Menu</span></button>
    <button class="tab-btn" data-tab="stats"><span class="tab-icon">🏆</span><span class="tab-label">Stats</span></button>
  </div>

  <div id="floats-container"></div>
  <div id="ach-popup" class="ach-popup" style="display:none"></div>
  <div id="notification" class="notification" style="display:none"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.2.6/pixi.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
